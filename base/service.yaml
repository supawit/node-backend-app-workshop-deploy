# infra/kustomize/base/service.yaml
# Workshop: GitOps with Argo CD — Day 1, Section 4, Lab 7
# Base Service — ใช้ร่วมกันในทุก environment

apiVersion: v1
kind: Service
metadata:
  name: my-app
  labels:
    app: my-app
spec:
  type: NodePort
  selector:
    app: my-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000    # ตรงกับ containerPort ใน deployment.yaml
      nodePort: 30080     # ตรงกับ kind-config.yaml extraPortMappings
